<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <filter id="wobble">
      <feTurbulence type="fractalNoise" baseFrequency="0.08" numOctaves="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2"/>
    </filter>
  </defs>
  <g filter="url(#wobble)" stroke="#2d3436" stroke-width="2.5" stroke-linecap="round" fill="none">
    <!-- proboscis -->
    <line x1="60" y1="85" x2="60" y2="105" stroke-width="2"/>
    <!-- legs -->
    <line x1="45" y1="55" x2="25" y2="35"/>
    <line x1="75" y1="55" x2="95" y2="35"/>
    <line x1="42" y1="68" x2="18" y2="65"/>
    <line x1="78" y1="68" x2="102" y2="65"/>
    <line x1="45" y1="78" x2="28" y2="95"/>
    <line x1="75" y1="78" x2="92" y2="95"/>
    <!-- left wing -->
    <path d="M48 50 Q15 20 10 55 Q20 85 50 65" fill="rgba(255,255,255,0.7)"/>
    <!-- right wing -->
    <path d="M72 50 Q105 20 110 55 Q100 85 70 65" fill="rgba(255,255,255,0.7)"/>
    <!-- body -->
    <ellipse cx="60" cy="60" rx="14" ry="28" fill="#636e72"/>
    <!-- stripes -->
    <line x1="52" y1="48" x2="68" y2="48"/>
    <line x1="50" y1="60" x2="70" y2="60"/>
    <line x1="52" y1="72" x2="68" y2="72"/>
    <!-- head -->
    <circle cx="60" cy="88" r="7" fill="#2d3436"/>
  </g>
</svg>
