<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>fucking stupid 蚊子</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gloria+Hallelujah&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/styles.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game" class="game-screen">
    <div id="mosquito" class="mosquito">
      <img src="../../assets/mosquito/mosquito.svg" alt="蚊子" draggable="false" />
    </div>

    <div id="hud" class="hud hidden">
      <div class="blood-bar-wrap">
        <span class="label">血量</span>
        <div class="blood-bar">
          <div id="blood-fill" class="blood-fill"></div>
        </div>
      </div>
      <button id="light-btn" class="btn-hand light-btn">
        💡 开灯 <small id="light-count">(3)</small>
      </button>
    </div>

    <div id="bite-marks"></div>

    <div id="overlay-start" class="overlay">
      <div class="overlay-card rough-box">
        <h1 class="title-scribble">fucking stupid 蚊子</h1>
        <p>关灯了，蚊子在房间里乱飞。</p>
        <p>戴上耳机，听声音判断它在哪，然后点击屏幕拍死它。</p>
        <p>被咬太多次就会失血过多，游戏结束。</p>
        <button id="start-btn" class="btn-hand" style="margin-top:1rem;">开始游戏</button>
        <p class="audio-note">* 需要声音，请先调大音量</p>
      </div>
    </div>

    <div id="overlay-win" class="overlay hidden">
      <div class="overlay-card rough-box">
        <h1 class="title-scribble">拍死了！</h1>
        <p>蚊子被你一巴掌送走。</p>
        <button id="restart-win" class="btn-hand">再玩一次</button>
      </div>
    </div>

    <div id="overlay-lose" class="overlay hidden">
      <div class="overlay-card rough-box">
        <h1 class="title-scribble">被吸干了…</h1>
        <p>蚊子吃饱喝足飞走了。</p>
        <button id="restart-lose" class="btn-hand">复仇</button>
      </div>
    </div>
  </div>

  <script type="module" src="game.js"></script>
</body>
</html>
